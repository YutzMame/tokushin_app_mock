<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">授業後アンケートDX 部門別タイムライン</title>
  <desc id="desc">横軸を時間、縦軸を部門として、現行紙運用を踏まえたDX後の授業後アンケートと出席管理の流れを示す。</desc>
  <defs>
    <style>
      .bg { fill: #f7f6f2; }
      .axis { stroke: #cfc9bd; stroke-width: 1; }
      .lane-title { fill: #33312d; font: 700 22px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; }
      .time-title { fill: #4b4740; font: 700 17px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; }
      .box { fill: #fff; stroke: #80786b; stroke-width: 1.5; rx: 8; }
      .student { fill: #e8f6ef; stroke: #14795f; }
      .school { fill: #eef4fb; stroke: #245d8f; }
      .ops { fill: #fff7df; stroke: #9a6818; }
      .data { fill: #f4f1e8; stroke: #7d735f; }
      .pos { fill: #fff0ed; stroke: #a7422e; }
      .text { fill: #2f2e2b; font: 700 17px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; }
      .small { fill: #5d5850; font: 13px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; }
      .arrow { stroke: #6b655d; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 6 5; }
      .legend { fill: #fff; stroke: #d8d4ca; stroke-width: 1; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6b655d" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <text x="48" y="54" class="lane-title">授業後アンケートDX 部門別タイムライン</text>
  <text x="48" y="84" class="small">実線: 顧客・業務の流れ / 点線: データ連携・参照。出席判定とアンケート回答は分離し、回答は授業報告・品質改善に使う。</text>

  <rect class="legend" x="1210" y="28" width="330" height="70" rx="8"/>
  <line class="arrow" x1="1232" y1="52" x2="1302" y2="52"/>
  <text x="1312" y="57" class="small">顧客・業務フロー</text>
  <line class="arrow dashed" x1="1232" y1="78" x2="1302" y2="78"/>
  <text x="1312" y="83" class="small">データ連携・参照</text>

  <g transform="translate(210 120)">
    <text x="0" y="0" class="time-title">事前準備</text>
    <text x="220" y="0" class="time-title">来校・受付</text>
    <text x="440" y="0" class="time-title">授業中</text>
    <text x="660" y="0" class="time-title">最終コマ前休み時間</text>
    <text x="930" y="0" class="time-title">授業直後</text>
    <text x="1130" y="0" class="time-title">事後処理</text>
  </g>

  <line class="axis" x1="190" y1="140" x2="1510" y2="140"/>
  <line class="axis" x1="190" y1="250" x2="1510" y2="250"/>
  <line class="axis" x1="190" y1="360" x2="1510" y2="360"/>
  <line class="axis" x1="190" y1="470" x2="1510" y2="470"/>
  <line class="axis" x1="190" y1="580" x2="1510" y2="580"/>
  <line class="axis" x1="190" y1="690" x2="1510" y2="690"/>
  <line class="axis" x1="190" y1="800" x2="1510" y2="800"/>

  <text x="50" y="206" class="lane-title">生徒</text>
  <text x="50" y="316" class="lane-title">校舎スタッフ</text>
  <text x="50" y="426" class="lane-title">特進業務</text>
  <text x="50" y="536" class="lane-title">データ基盤/GAS</text>
  <text x="50" y="646" class="lane-title">POS・Access</text>
  <text x="50" y="756" class="lane-title">授業報告/分析</text>

  <rect class="box data" x="225" y="485" width="170" height="72"/>
  <text x="310" y="512" text-anchor="middle" class="text">マスタ登録</text>
  <text x="310" y="536" text-anchor="middle" class="small">生徒・講座・授業枠</text>

  <rect class="box ops" x="225" y="375" width="170" height="72"/>
  <text x="310" y="402" text-anchor="middle" class="text">出席簿準備</text>
  <text x="310" y="426" text-anchor="middle" class="small">担当者・コマ数も掲載</text>

  <rect class="box student" x="425" y="160" width="170" height="72"/>
  <text x="510" y="187" text-anchor="middle" class="text">来校</text>
  <text x="510" y="211" text-anchor="middle" class="small">学生証/受講票を提示</text>

  <rect class="box school" x="425" y="270" width="170" height="72"/>
  <text x="510" y="297" text-anchor="middle" class="text">受付打刻</text>
  <text x="510" y="321" text-anchor="middle" class="small">端末で生徒番号読取</text>

  <rect class="box data" x="425" y="485" width="170" height="72"/>
  <text x="510" y="512" text-anchor="middle" class="text">即時照合</text>
  <text x="510" y="536" text-anchor="middle" class="small">授業枠・申込と照合</text>

  <rect class="box student" x="645" y="160" width="170" height="72"/>
  <text x="730" y="187" text-anchor="middle" class="text">授業受講</text>
  <text x="730" y="211" text-anchor="middle" class="small">遅刻早退でも出席扱い</text>

  <rect class="box school" x="645" y="270" width="170" height="72"/>
  <text x="730" y="297" text-anchor="middle" class="text">出席確認</text>
  <text x="730" y="321" text-anchor="middle" class="small">紙/管理画面で確認</text>

  <rect class="box student" x="875" y="160" width="205" height="72"/>
  <text x="978" y="187" text-anchor="middle" class="text">アンケート回答</text>
  <text x="978" y="211" text-anchor="middle" class="small">休み時間中に2〜3分</text>

  <rect class="box data" x="875" y="485" width="205" height="72"/>
  <text x="978" y="512" text-anchor="middle" class="text">回答保存</text>
  <text x="978" y="536" text-anchor="middle" class="small">仮名ID・講座IDで保存</text>

  <rect class="box school" x="1105" y="270" width="175" height="72"/>
  <text x="1192" y="297" text-anchor="middle" class="text">未回答確認</text>
  <text x="1192" y="321" text-anchor="middle" class="small">必要に応じて声かけ</text>

  <rect class="box ops" x="1105" y="375" width="175" height="72"/>
  <text x="1192" y="402" text-anchor="middle" class="text">当日集計確認</text>
  <text x="1192" y="426" text-anchor="middle" class="small">満足度・難易度・コメント</text>

  <rect class="box pos" x="1320" y="595" width="175" height="72"/>
  <text x="1408" y="622" text-anchor="middle" class="text">CSVアップロード</text>
  <text x="1408" y="646" text-anchor="middle" class="small">学力POS/特進POS</text>

  <rect class="box ops" x="1320" y="375" width="175" height="72"/>
  <text x="1408" y="402" text-anchor="middle" class="text">出力作成</text>
  <text x="1408" y="426" text-anchor="middle" class="small">コマ数CSV/回答CSV</text>

  <rect class="box data" x="1320" y="485" width="175" height="72"/>
  <text x="1408" y="512" text-anchor="middle" class="text">コマ数再計算</text>
  <text x="1408" y="536" text-anchor="middle" class="small">基準判定・未達アラート</text>

  <rect class="box ops" x="1320" y="705" width="175" height="72"/>
  <text x="1408" y="732" text-anchor="middle" class="text">授業報告</text>
  <text x="1408" y="756" text-anchor="middle" class="small">当日サマリを貼付</text>

  <path class="arrow" d="M595 196 L645 196"/>
  <path class="arrow" d="M510 232 L510 270"/>
  <path class="arrow dashed" d="M595 306 L645 306"/>
  <path class="arrow dashed" d="M595 520 L875 520"/>
  <path class="arrow" d="M815 196 L875 196"/>
  <path class="arrow dashed" d="M1080 520 L1320 520"/>
  <path class="arrow dashed" d="M1080 520 L1192 342"/>
  <path class="arrow" d="M1280 411 L1320 411"/>
  <path class="arrow dashed" d="M1408 557 L1408 595"/>
  <path class="arrow dashed" d="M1408 447 L1408 485"/>
  <path class="arrow dashed" d="M1408 557 L1408 705"/>
  <path class="arrow dashed" d="M395 520 L425 520"/>
  <path class="arrow dashed" d="M395 411 L645 306"/>

  <text x="225" y="840" class="small">注: AppSheet/スプレッドシートを使う場合も、回答データと生徒番号対応表は分離し、広範囲共有Driveに非暗号化の氏名・生徒番号・回答を同居させない。</text>
</svg>
