<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>校舎QR読取タブレット v2</title>
  <link rel="stylesheet" href="assets/screens_v2.css">
</head>
<body data-app="tablet-v2">
  <header class="topbar compact">
    <div class="brand">
      <div class="brand-mark">QR</div>
      <div>
        <h1>校舎QR読取タブレット</h1>
        <p>管理者ログイン＋QR読取専用</p>
      </div>
    </div>
    <div class="top-actions">
      <button class="ghost" type="button" data-reset-state>初期データに戻す</button>
      <a class="button-link" href="index.html">入口</a>
    </div>
  </header>

  <main class="wrap" style="max-width:720px">
    <section class="panel" id="tabletLogin">
      <div class="panel-head"><h2>管理者ログイン</h2></div>
      <div class="panel-body">
        <div class="notice">校舎据置のタブレットです。管理者がログインしてからQR読取を行います。（デモ: ID <strong>admin</strong> / パスワード <strong>admin1234</strong>）</div>
        <div class="form-grid" style="grid-template-columns:1fr; margin-top:12px">
          <label>管理者ID<input id="tabletAdminId" value="admin"></label>
          <label>パスワード<input id="tabletAdminPw" type="password" value="admin1234"></label>
        </div>
        <button class="primary" id="tabletLoginButton" type="button" style="width:100%; margin-top:12px">ログイン</button>
        <div id="tabletLoginError" class="notice red is-hidden" style="margin-top:10px"></div>
      </div>
    </section>

    <section class="panel is-hidden" id="tabletScanner">
      <div class="panel-head">
        <h2>QR読取</h2>
        <button class="small" id="tabletLogout" type="button">ログアウト</button>
      </div>
      <div class="panel-body">
        <div class="form-grid" style="grid-template-columns:repeat(2,minmax(0,1fr))">
          <label>校舎<select id="tabletVenueSelect"></select></label>
          <label>読取対象の講座<select id="tabletCourseSelect"></select></label>
        </div>
        <div class="qr-box" style="margin-top:12px; min-height:230px"><div class="qr-mark" aria-hidden="true"></div></div>
        <label style="margin-top:12px">読取（生徒の提示QRをスキャン）<select id="tabletScanStudent"></select></label>
        <button class="primary" id="tabletScanButton" type="button" style="width:100%; margin-top:12px">QRを読み取って入室登録</button>
        <div id="tabletReadResult" style="margin-top:12px"></div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <script src="assets/app_v2.js"></script>
</body>
</html>
